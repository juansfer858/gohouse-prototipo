<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡GO! HOUSE — Panel de Pedidos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root{
    --bg: #16231F;
    --surface: #1E312B;
    --surface-2: #24392F;
    --line: #33473D;
    --mango: #E8863A;
    --mango-dim: #6B4A2A;
    --green: #5FBF8B;
    --green-dim: #2E4A3B;
    --red: #E1685F;
    --red-dim: #4A2E2C;
    --gray: #7D8D86;
    --text: #F3EFE6;
    --text-dim: #A9B8B0;
    --paper: #F3EFE6;
    --paper-text: #22301F;
  }

  * { box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  header{
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .logo-row{
    display:flex;
    align-items:center;
    gap: 12px;
  }

  .logo-mark{
    width: 46px; height: 46px;
    border-radius: 50%;
    flex-shrink: 0;
    overflow: hidden;
    box-shadow: 0 0 0 2px var(--line);
  }
  .logo-mark img{ width: 100%; height: 100%; object-fit: cover; display:block; }

  .brand h1{
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 1.35rem;
    margin: 0;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }

  .brand .tag{
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--mango);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .logo-note{
    font-size: 0.68rem;
    color: var(--text-dim);
    margin-top: 10px;
    font-style: italic;
  }

  .stats{
    display:flex;
    gap: 20px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .stat{ display:flex; flex-direction: column; }
  .stat .n{ font-family: 'Fraunces', serif; font-size: 1.6rem; font-weight: 600; line-height: 1; }
  .stat .l{ font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

  main{
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 24px;
  }

  @media (max-width: 800px){ main{ grid-template-columns: 1fr; } }

  section h2{
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 600;
    margin: 0 0 12px;
    display:flex; align-items:center; gap: 8px;
  }
  section h2 .count{ font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-dim); font-weight: 400; }

  .new-order{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 20px;
  }

  .new-order .grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 500px){ .new-order .grid{ grid-template-columns: 1fr; } }

  label{ font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; display:block; margin-bottom: 4px; }

  input, textarea, select{
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 9px 10px;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
  }
  input:focus, textarea:focus, select:focus{ outline: 2px solid var(--mango); outline-offset: 1px; }
  textarea{ resize: vertical; min-height: 44px; }

  .field{ margin-bottom: 10px; }
  .field.full{ grid-column: 1 / -1; }

  .btn{
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    border: none;
    border-radius: 6px;
    padding: 10px 16px;
    cursor: pointer;
    transition: transform 0.08s ease, opacity 0.15s ease;
  }
  .btn:active{ transform: scale(0.97); }
  .btn-primary{ background: var(--mango); color: #1C1108; }
  .btn-primary:hover{ opacity: 0.92; }
  .btn-ghost{ background: transparent; border: 1px solid var(--line); color: var(--text); }
  .btn-sm{ padding: 6px 10px; font-size: 0.75rem; }
  .btn-full{ width: 100%; }
  .btn-danger-ghost{ background: transparent; border: 1px solid var(--red); color: var(--red); }

  .ticket{
    background: var(--paper);
    color: var(--paper-text);
    border-radius: 4px;
    padding: 14px 16px 14px;
    margin-bottom: 14px;
    position: relative;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  }
  .ticket::before{
    content: "";
    position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background-image: radial-gradient(circle, var(--bg) 3px, transparent 3.2px);
    background-size: 14px 12px; background-position: -2px -6px; background-repeat: repeat-x;
  }
  .ticket-top{ display:flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; padding-top: 4px; }
  .ticket-id{ font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: #6B7A63; }
  .ticket-time{ font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: #6B7A63; }
  .ticket .cliente{ font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.05rem; margin: 2px 0; }
  .ticket .direccion{ font-size: 0.85rem; color: #4A5A44; margin-bottom: 6px; }
  .ticket .pedido-text{ font-size: 0.88rem; border-top: 1px dashed #C9C2AD; border-bottom: 1px dashed #C9C2AD; padding: 8px 0; margin: 8px 0; white-space: pre-wrap; }

  .badge-row{ display:flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .badge{ font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.03em; }
  .badge-pago{ background: #E3DECC; color: #4A4326; }
  .badge-estado-nuevo{ background: var(--mango); color: #1C1108; }
  .badge-estado-aceptado{ background: #D7CFA8; color: #4A4326; }
  .badge-estado-camino{ background: #C9E4D6; color: #234433; }

  .ticket-actions{ display:flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .ticket-actions .btn{ font-size: 0.78rem; padding: 7px 12px; }
  .repartidor-tag{ font-size: 0.82rem; color: #234433; font-weight: 600; }
  .waiting-note{ font-size: 0.8rem; color: #8A7A50; font-style: italic; }

  .empty{ color: var(--text-dim); font-size: 0.85rem; border: 1px dashed var(--line); border-radius: 8px; padding: 20px; text-align: center; }

  .repartidor-card{
    background: var(--surface); border: 1px solid var(--line); border-radius: 8px;
    padding: 12px 14px; margin-bottom: 10px; display:flex; align-items:center; justify-content: space-between; gap: 10px;
  }
  .repartidor-info{ display:flex; align-items:center; gap: 10px; }
  .dot{ width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .dot-disponible{ background: var(--green); box-shadow: 0 0 0 3px var(--green-dim); }
  .dot-en_ruta{ background: var(--mango); box-shadow: 0 0 0 3px var(--mango-dim); }
  .dot-fuera{ background: var(--gray); box-shadow: 0 0 0 3px #3A4A44; }
  .repartidor-name{ font-weight: 600; font-size: 0.92rem; }
  .repartidor-estado{ font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; }
  .icon-btn{
    background: var(--bg); border: 1px solid var(--line); color: var(--text-dim); border-radius: 5px;
    width: 26px; height: 26px; display:flex; align-items:center; justify-content:center; cursor: pointer; font-size: 0.75rem;
  }
  .icon-btn:hover{ color: var(--red); border-color: var(--red); }
  .add-repartidor{ display:flex; gap: 8px; margin-top: 6px; }
  .add-repartidor input{ flex: 1; }

  .history-toggle{
    background: none; border: none; color: var(--text-dim); font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem; cursor: pointer; text-decoration: underline; padding: 0; margin-top: 6px;
  }
  .history-item{ font-size: 0.8rem; color: var(--text-dim); padding: 8px 0; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; gap: 8px; }

  .toast{
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--surface-2); border: 1px solid var(--line); color: var(--text);
    padding: 10px 18px; border-radius: 8px; font-size: 0.85rem; opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease; z-index: 50;
  }
  .toast.show{ opacity: 1; }
  .loading-note{ color: var(--text-dim); font-size: 0.8rem; padding: 20px; text-align: center; }
</style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBj6AOxIdf9-SRzxyxQV-DtyvwliU-2H7Q",
  authDomain: "gohouse-app-394e9.firebaseapp.com",
  databaseURL: "https://gohouse-app-394e9-default-rtdb.firebaseio.com",
  projectId: "gohouse-app-394e9",
  storageBucket: "gohouse-app-394e9.firebasestorage.app",
  messagingSenderId: "230748060252",
  appId: "1:230748060252:web:8538de618a5360c63cc499"
};
firebase.initializeApp(firebaseConfig);
const dbRef = firebase.database().ref('gohouse-data');

let data = { orders: [], repartidores: [] };

function todayStr(){ return new Date().toDateString(); }

function normalizarData(val){
  const d = val || {};
  if(!Array.isArray(d.orders)) d.orders = [];
  if(!Array.isArray(d.repartidores) || d.repartidores.length === 0){
    d.repartidores = (d.repartidores && d.repartidores.length) ? d.repartidores : [
      { id: 'r1', nombre: 'Andrés', estado: 'disponible' },
      { id: 'r2', nombre: 'Camilo', estado: 'disponible' }
    ];
  }
  return d;
}

function iniciarEscuchaEnVivo(){
  dbRef.on('value', snapshot => {
    const huboValorOriginal = !!snapshot.val();
    data = normalizarData(snapshot.val());
    if(!huboValorOriginal){
      dbRef.set(data);
    }
    document.getElementById('loading-note').style.display = 'none';
    document.getElementById('main').style.display = 'grid';
    render();
  }, error => {
    console.error('Error de conexión con Firebase:', error);
    document.getElementById('loading-note').textContent = 'No se pudo conectar. Revisa tu internet.';
  });
}

function conTiempoLimite(promesa, ms, mensajeTimeout){
  return Promise.race([
    promesa,
    new Promise((_, reject) => setTimeout(() => reject(new Error(mensajeTimeout)), ms))
  ]);
}

async function saveData(){
  try{ await conTiempoLimite(dbRef.set(data), 10000, 'Tiempo de espera agotado guardando.'); }
  catch(e){ showToast('No se pudo guardar: ' + e.message); console.error(e); }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}

function uid(){ return Math.random().toString(36).slice(2, 8); }
function fmtTime(ts){ return new Date(ts).toLocaleTimeString('es-CO', { hour: '2-digit', minute:'2-digit' }); }

async function crearPedido(){
  const cliente = document.getElementById('in-cliente').value.trim();
  const telefono = document.getElementById('in-telefono').value.trim();
  const direccion = document.getElementById('in-direccion').value.trim();
  const pedido = document.getElementById('in-pedido').value.trim();
  const pago = document.getElementById('in-pago').value;

  if(!cliente || !direccion || !pedido){ showToast('Completa cliente, dirección y pedido.'); return; }

  const orden = {
    id: uid(), numero: (data.orders.length + 1),
    cliente, telefono, direccion, pedido, pago,
    estado: 'nuevo', repartidorId: null,
    createdAt: Date.now(), deliveredAt: null, day: todayStr()
  };
  data.orders.unshift(orden);
  await saveData();

  document.getElementById('in-cliente').value = '';
  document.getElementById('in-telefono').value = '';
  document.getElementById('in-direccion').value = '';
  document.getElementById('in-pedido').value = '';

  showToast('Pedido #' + orden.numero + ' enviado a los domiciliarios disponibles.');
  render();
}

async function liberarPedido(orderId){
  const orden = data.orders.find(o => o.id === orderId);
  if(!orden) return;
  if(orden.repartidorId){
    const rep = data.repartidores.find(r => r.id === orden.repartidorId);
    if(rep) rep.estado = 'disponible';
  }
  orden.repartidorId = null;
  orden.estado = 'nuevo';
  await saveData();
  showToast('Pedido liberado, vuelve a estar disponible.');
  render();
}

async function agregarRepartidor(){
  const input = document.getElementById('in-repartidor');
  const nombre = input.value.trim();
  if(!nombre){ showToast('Escribe un nombre.'); return; }
  data.repartidores.push({ id: uid(), nombre, estado: 'disponible' });
  input.value = '';
  await saveData();
  render();
}

async function eliminarRepartidor(repId){
  const enUso = data.orders.some(o => o.repartidorId === repId && o.estado !== 'entregado');
  if(enUso){ showToast('Tiene un pedido activo, no se puede quitar todavía.'); return; }
  data.repartidores = data.repartidores.filter(r => r.id !== repId);
  await saveData();
  render();
}

function toggleHistorial(){
  const el = document.getElementById('lista-historial');
  const btn = document.getElementById('history-toggle');
  const showing = el.style.display !== 'none';
  el.style.display = showing ? 'none' : 'block';
  btn.textContent = showing ? 'Ver historial de entregados de hoy' : 'Ocultar historial';
}

function estadoLabel(estado){
  return { nuevo: 'Buscando domiciliario', aceptado: 'Aceptado', camino: 'En camino', entregado: 'Entregado' }[estado] || estado;
}

function render(){
  const hoy = todayStr();
  const activos = data.orders.filter(o => o.day === hoy && o.estado !== 'entregado');
  const entregadosHoy = data.orders.filter(o => o.day === hoy && o.estado === 'entregado');

  document.getElementById('pedidos-count').textContent = '(' + activos.length + ' activos)';
  document.getElementById('stat-nuevos').textContent = data.orders.filter(o => o.day===hoy && o.estado==='nuevo').length;
  document.getElementById('stat-curso').textContent = data.orders.filter(o => o.day===hoy && (o.estado==='aceptado'||o.estado==='camino')).length;
  document.getElementById('stat-entregados').textContent = entregadosHoy.length;
  document.getElementById('stat-disponibles').textContent = data.repartidores.filter(r => r.estado==='disponible').length;
  document.getElementById('repartidores-count').textContent = '(' + data.repartidores.length + ')';

  const listaEl = document.getElementById('lista-pedidos');
  if(activos.length === 0){
    listaEl.innerHTML = '<div class="empty">No hay pedidos activos. Registra uno arriba.</div>';
  } else {
    listaEl.innerHTML = activos.map(o => {
      const rep = data.repartidores.find(r => r.id === o.repartidorId);
      const badgeEstadoClase = { nuevo:'badge-estado-nuevo', aceptado:'badge-estado-aceptado', camino:'badge-estado-camino' }[o.estado] || '';

      let accionesHtml = '';
      if(o.estado === 'nuevo'){
        accionesHtml = `<span class="waiting-note">Esperando que un domiciliario lo acepte en GoHouse…</span>`;
      } else {
        accionesHtml = `
          <span class="repartidor-tag">${rep ? rep.nombre : '—'}</span>
          <button class="btn btn-danger-ghost btn-sm" onclick="liberarPedido('${o.id}')">Liberar pedido</button>`;
      }

      return `
        <div class="ticket">
          <div class="ticket-top">
            <span class="ticket-id">PEDIDO #${o.numero}</span>
            <span class="ticket-time">${fmtTime(o.createdAt)}</span>
          </div>
          <div class="cliente">${escapeHtml(o.cliente)}</div>
          <div class="direccion">${escapeHtml(o.direccion)}${o.telefono ? ' · ' + escapeHtml(o.telefono) : ''}</div>
          <div class="badge-row">
            <span class="badge badge-pago">${o.pago}</span>
            <span class="badge ${badgeEstadoClase}">${estadoLabel(o.estado)}</span>
          </div>
          <div class="pedido-text">${escapeHtml(o.pedido)}</div>
          <div class="ticket-actions">${accionesHtml}</div>
        </div>`;
    }).join('');
  }

  const histEl = document.getElementById('lista-historial');
  if(entregadosHoy.length === 0){
    histEl.innerHTML = '<div class="empty">Aún no hay entregas hoy.</div>';
  } else {
    histEl.innerHTML = entregadosHoy.slice().reverse().map(o => {
      const rep = data.repartidores.find(r => r.id === o.repartidorId);
      return `<div class="history-item"><span>#${o.numero} · ${escapeHtml(o.cliente)} · ${rep ? rep.nombre : '—'}</span><span>${fmtTime(o.deliveredAt)}</span></div>`;
    }).join('');
  }

  const repEl = document.getElementById('lista-repartidores');
  if(data.repartidores.length === 0){
    repEl.innerHTML = '<div class="empty">Agrega tu primer domiciliario abajo.</div>';
  } else {
    repEl.innerHTML = data.repartidores.map(r => `
      <div class="repartidor-card">
        <div class="repartidor-info">
          <span class="dot dot-${r.estado}"></span>
          <div><div class="repartidor-name">${escapeHtml(r.nombre)}</div><div class="repartidor-estado">${r.estado.replace('_',' ')}</div></div>
        </div>
        <div class="repartidor-controls"><button class="icon-btn" title="Quitar" onclick="eliminarRepartidor('${r.id}')">✕</button></div>
      </div>
    `).join('');
  }
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

iniciarEscuchaEnVivo();
</script>
